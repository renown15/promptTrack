services:
  postgres-test:
    image: pgvector/pgvector:pg16
    container_name: prompttrack-postgres-test
    environment:
      POSTGRES_USER: prompttrack_test
      POSTGRES_PASSWORD: prompttrack_test
      POSTGRES_DB: prompttrack_test
    ports:
      - "5452:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prompttrack_test -d prompttrack_test"]
      interval: 5s
      timeout: 3s
      retries: 5
